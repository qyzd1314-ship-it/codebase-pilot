spring:
  datasource:
    url: jdbc:h2:file:./data/codebase-pilot;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
app:
  repo:
    pgvector:
      enabled: false
    embedding-model: local-hash-128
